<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To Do List</title>
    <link rel="stylesheet" href="toDo.css">

    <!--FONT START-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lavishly+Yours&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <!--FONT END-->

</head>
<body>
    <h1>Saturday To Do List</h1>

    <ul class="todo-list">
        <li class="the_list">
            <label for="morning-task">Attend Chelsea in Bloom Festival</label>
            <input type="checkbox" id="morning-task">
            <ul class="sub-item">
                <li>
                    <a class="sub-item-link" target="_blank" href="https://www.nam.ac.uk/whats-on/chelsea-bloom-ration-drop?gad_source=1&gad_campaignid=23306309997&gbraid=0AAAAADLHbI7Bt_glrmZ_OGNi-OIQ4ntWh&gclid=Cj0KCQjwoMXQBhDcARIsAH-eEttCv3pRCqwwSMcF22GLEeYhrSC_AYIbY_IyR8V7LTAHP36EFM9WA1QaAnwjEALw_wcB"> CIB Website</a>
                </li>

                <li>
                    <a class="sub-item-link" target="_blank" href="https://www.google.com/maps/place/National+Army+Museum/@51.4864049,-0.1653122,17z/data=!4m14!1m7!3m6!1s0x487605114095ad99:0x770bdc4ee41d1b7f!2sNational+Army+Museum!8m2!3d51.486405!4d-0.1604413!16zL20vMDU2cjds!3m5!1s0x487605114095ad99:0x770bdc4ee41d1b7f!8m2!3d51.486405!4d-0.1604413!16zL20vMDU2cjds?entry=ttu&g_ep=EgoyMDI2MDUyMC4wIKXMDSoASAFQAw%3D%3D"> Map of National Army Museum</a>
                </li>                
            </ul>
        </li>

        <li class="the_list">
            <label for="afternoon-task">Street Food in Chinatown</label>
            <input type="checkbox" id="afternoon-task">
            <ul class="sub-item">
                <li>
                    <a class="sub-item-link" target="_blank" href="https://tfl.gov.uk/bus/stop/490006008W/dean-street-chinatown?lineId=19" >Bus Timetables</a>
                </li>

                <li>
                    <a class="sub-item-link" target="_blank" href="https://chinatown.co.uk/en/blog/category/restaurant/" >Restaurants to Visit</a>
                </li>               
            </ul>
        </li>

        <li class="the_list">
            <label for="evening-dinner">See a Theatre show at Regent's Park</label>
            <input type="checkbox" id="evening-dinner">
            <ul class="sub-item">
                <li>
                    <a class="sub-item-link" target="_blank" href="https://www.google.com/maps/place/Regent's+Park+Open+Air+Theatre/@51.5284298,-0.1573072,17z/data=!4m6!3m5!1s0x48761ac565a69b0b:0x47a624e68381832b!8m2!3d51.5284298!4d-0.1547323!16zL20vMDRybHJm?entry=ttu&g_ep=EgoyMDI2MDUyMC4wIKXMDSoASAFQAw%3D%3D">Map of Theatre</a>
                </li>

                <li>
                    <a class="sub-item-link" target="_blank" href="https://openairtheatre.com/whats-on">Shows at the Park</a>
                </li>
                
            </ul>
        </li>

        <li class="the_list">
            <label for="night-fun"> Catch Magic Show at Andaz Hotel </label>
            <input type="checkbox" id="night-fun">
            <ul class="sub-item">
                <li>
                    <a class="sub-item-link" target="_blank" href="https://www.magichourshow.com/magic-at-the-temple">The Maic Hour Website</a>
                </li>
                <li>
                    <a class="sub-item-link" target="_blank" href="https://www.google.com/maps/place/Andaz+London+Liverpool+Street,+by+Hyatt/@51.517312,-0.0839221,17z/data=!3m1!5s0x48761cb286233a5d:0xe5a2dc79fcca2bbd!4m9!3m8!1s0x48761cb289478319:0x419c4e2d44fdcfbe!5m2!4m1!1i2!8m2!3d51.517312!4d-0.0813472!16s%2Fm%2F0g4q0l_?entry=ttu&g_ep=EgoyMDI2MDUyMC4wIKXMDSoASAFQAw%3D%3D">Map of Andaz Hotel</a>
                </li>
            </ul>
        </li>
    </ul>

    
</body>
</html>
